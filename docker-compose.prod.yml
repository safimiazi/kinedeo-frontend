services:
  web:
    build:
      context: .
      dockerfile: Dockerfile
      target: production
      args:
        NEXT_PUBLIC_API_URL: https://api.kinedeo.com/api
        NEXT_PUBLIC_APP_URL: https://kinedeo.com

    image: ghcr.io/${GHCR_OWNER}/kinedeo-web:latest
    container_name: kinedeo-web-prod

    restart: unless-stopped

    ports:
      - "3001:3000"

    env_file:
      - .env.production

    environment:
      NODE_ENV: production
      NEXT_PUBLIC_API_URL: https://api.kinedeo.com/api
      NEXT_PUBLIC_APP_URL: https://kinedeo.com

    networks:
      - kinedeo-prod

    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:3000"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

networks:
  kinedeo-prod:
    driver: bridge
