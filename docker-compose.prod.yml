version: "3.9"

services:
  web:
    build:
      context: .
      dockerfile: Dockerfile
      target: production
    image: kinedeo-web:latest
    container_name: kinedeo-web-prod
    restart: always
    ports:
      - "3000:3000"
    env_file:
      - .env.production
    environment:
      NODE_ENV: production
    networks:
      - kinedeo-prod

networks:
  kinedeo-prod:
    driver: bridge
