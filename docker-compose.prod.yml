services:
  web:
    build:
      context: .
      dockerfile: Dockerfile
      target: production
      args:
        NEXT_PUBLIC_API_URL: https://api.kinedeo.com/api
        NEXT_PUBLIC_APP_URL: https://kinedeo.com
    image: kinedeo-web:latest
    container_name: kinedeo-web-prod
    restart: always
    ports:
      - "3000:3000"
    env_file:
      - .env.production
    environment:
      NODE_ENV: production
    networks:
      - kinedeo-prod

networks:
  kinedeo-prod:
    driver: bridge
