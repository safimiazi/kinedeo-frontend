name: Deploy — Production (Manual)

# ONLY runs when you manually trigger it from GitHub Actions UI.
# Pulls the latest Docker image from GHCR and deploys it to the production VPS.
# This is the final step after CI + Docker build has passed on the prod branch.
on:
  workflow_dispatch:
    inputs:
      confirm:
        description: "Type 'deploy' to confirm production deployment"
        required: true
        default: ""
      image_tag:
        description: "Docker image tag to deploy (default: latest)"
        required: false
        default: "latest"

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository_owner }}/kinedeo-web

jobs:
  # ────────────────────────────────────────────────────────────────────────────
  # Guard: abort if confirmation is wrong
  # ────────────────────────────────────────────────────────────────────────────
  guard:
    name: Confirm Deployment
    runs-on: ubuntu-latest
    steps:
      - name: Check confirmation
        run: |
          if [ "${{ github.event.inputs.confirm }}" != "deploy" ]; then
            echo "❌ You must type 'deploy' to confirm. Got: '${{ github.event.inputs.confirm }}'"
            exit 1
          fi
          echo "✅ Deployment confirmed by ${{ github.actor }}"

  # ────────────────────────────────────────────────────────────────────────────
  # Deploy to VPS via SSH
  # ────────────────────────────────────────────────────────────────────────────
  deploy:
    name: Deploy to Production VPS
    runs-on: ubuntu-latest
    needs: guard
    permissions:
      contents: read
      packages: read

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          ref: prod

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          port: ${{ secrets.VPS_PORT }}
          script: |
            set -e

            cd ${{ secrets.VPS_FRONTEND_PATH }}

            # Pull latest code from prod branch
            git pull origin prod

            # Login to GHCR
            echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io \
              -u ${{ github.actor }} --password-stdin

            # Pull the specified image
            IMAGE="${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ github.event.inputs.image_tag }}"
            docker pull $IMAGE

            # Restart container
            GHCR_OWNER=${{ github.repository_owner }} \
              docker compose -f docker-compose.prod.yml up -d --no-build

            # Cleanup
            docker image prune -f

            echo "✅ Frontend deployed: $IMAGE"

      - name: Deployment summary
        run: |
          echo "### ✅ Frontend Production Deployment Successful" >> $GITHUB_STEP_SUMMARY
          echo "| | |" >> $GITHUB_STEP_SUMMARY
          echo "|---|---|" >> $GITHUB_STEP_SUMMARY
          echo "| **Image** | \`${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ github.event.inputs.image_tag }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| **Branch** | \`prod\` |" >> $GITHUB_STEP_SUMMARY
          echo "| **Deployed by** | ${{ github.actor }} |" >> $GITHUB_STEP_SUMMARY
          echo "| **Time** | $(date -u '+%Y-%m-%d %H:%M:%S UTC') |" >> $GITHUB_STEP_SUMMARY
