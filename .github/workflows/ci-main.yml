name: CI — Main

# Runs on every push to main and on PRs targeting main.
# Validates that code is lint-clean, type-safe, and builds successfully.
# Does NOT build Docker images or deploy.
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  ci:
    name: Lint, Type-check & Build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js 24
        uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Type-check
        run: npx tsc --noEmit

      - name: Build
        run: npm run build
        env:
          NEXT_PUBLIC_API_URL: https://api.kinedeo.com/api
          NEXT_PUBLIC_APP_URL: https://kinedeo.com
