name: CI — Production

# Runs automatically when code is pushed/merged to the prod branch.
# Step 1: Lint, type-check, and build to validate the code.
# Step 2: Build the Docker image and push it to GHCR.
# Deployment to VPS is separate — trigger it manually via deploy-production.yml.
on:
  push:
    branches: [prod]
  pull_request:
    branches: [prod]

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository_owner }}/kinedeo-web

jobs:
  # ─── Job 1: Lint, Type-check & Build ────────────────────────────────────────
  ci:
    name: Lint, Type-check & Build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js 24
        uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Type-check
        run: npx tsc --noEmit

      - name: Build
        run: npm run build
        env:
          NEXT_PUBLIC_API_URL: https://api.kinedeo.com/api
          NEXT_PUBLIC_APP_URL: https://kinedeo.com

  # ─── Job 2: Build & Push Docker Image to GHCR ───────────────────────────────
  # Only runs on push (not on PRs) and only after CI passes.
  docker:
    name: Build & Push Docker Image
    runs-on: ubuntu-latest
    needs: ci
    if: github.event_name == 'push'
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=latest
            type=sha,format=short

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build & push image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: Dockerfile
          target: production
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          build-args: |
            NEXT_PUBLIC_API_URL=https://api.kinedeo.com/api
            NEXT_PUBLIC_APP_URL=https://kinedeo.com
